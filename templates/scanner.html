<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800">
    
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-8v4h8v-4zm-4-8a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-900">Scanner Terminal</h1>
                <p class="text-xs text-emerald-600 font-medium flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Live Gateway Sync
                </p>
            </div>
        </div>
        <a href="/logout" class="px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 font-medium rounded-lg text-sm transition-colors">Log Out</a>
    </nav>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            
            <div id="camera-container" class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 mb-4">
                <div id="reader" class="w-full rounded-2xl overflow-hidden bg-black min-h-[300px]"></div>
                <button onclick="showManual()" class="w-full mt-4 py-3 bg-slate-50 hover:bg-slate-100 text-slate-600 font-medium rounded-2xl transition-colors border border-slate-200">
                    Camera failed? Type Manually
                </button>
            </div>

            <div id="form-container" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <form id="scanForm" class="space-y-5">
                    
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Bus Plate Number</label>
                        <input type="text" id="bus_number" placeholder="E.G. GJ04 EA 2355" required 
                               class="w-full text-center px-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-lg text-slate-500 placeholder-slate-400 uppercase shadow-inner transition-all">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="bg-slate-100 p-1.5 rounded-2xl flex flex-col gap-1">
                                <button type="button" id="btn-in" onclick="setDirection('IN')" class="py-2.5 bg-white text-indigo-600 font-bold rounded-xl shadow-sm text-sm transition-all">IN</button>
                                <button type="button" id="btn-out" onclick="setDirection('OUT')" class="py-2.5 text-slate-500 font-bold rounded-xl text-sm transition-all hover:text-slate-700">OUT</button>
                                <input type="hidden" id="direction" value="IN">
                            </div>
                        </div>
                        <div>
                            <div class="bg-slate-100 p-1.5 rounded-2xl flex flex-col gap-1">
                                <button type="button" id="btn-filled" onclick="setLoad('Filled')" class="py-2.5 bg-white text-emerald-600 font-bold rounded-xl shadow-sm text-sm transition-all">Filled</button>
                                <button type="button" id="btn-empty" onclick="setLoad('Empty')" class="py-2.5 text-slate-500 font-bold rounded-xl text-sm transition-all hover:text-slate-700">Empty</button>
                                <input type="hidden" id="load" value="Filled">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Route Category</label>
                        <div class="bg-slate-100 p-1.5 rounded-2xl grid grid-cols-2 gap-1">
                            <button type="button" id="route-regular" onclick="setRoute('Regular')" class="py-3 bg-white text-indigo-600 font-bold rounded-xl shadow-sm text-xs sm:text-sm transition-all">Regular</button>
                            <button type="button" id="route-labour" onclick="setRoute('Labour')" class="py-3 text-slate-500 font-bold rounded-xl text-xs sm:text-sm transition-all hover:text-slate-700">Labour</button>
                            <button type="button" id="route-industrial" onclick="setRoute('Industrial Visit')" class="py-3 text-slate-500 font-bold rounded-xl text-xs sm:text-sm transition-all hover:text-slate-700">Industrial Visit</button>
                            <button type="button" id="route-exam" onclick="setRoute('Exam / Event')" class="py-3 text-slate-500 font-bold rounded-xl text-xs sm:text-sm transition-all hover:text-slate-700">Exam / Event</button>
                            <input type="hidden" id="route" value="Regular">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Odometer / KM (Optional)</label>
                        <input type="number" id="km" placeholder="000000" 
                               class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium text-lg text-slate-500 placeholder-slate-400 shadow-inner transition-all">
                    </div>

                    <button type="submit" id="submitBtn" class="w-full py-4 mt-2 bg-[#10b981] hover:bg-[#059669] text-white font-bold rounded-2xl transition-colors shadow-lg shadow-emerald-200 text-lg">
                        Confirm & Sync Record
                    </button>
                    
                    <button type="button" onclick="resetScanner()" class="w-full py-3 text-slate-400 hover:text-slate-600 font-medium text-sm transition-colors">
                        Cancel & Return to Camera
                    </button>
                </form>
            </div>

            <div id="success-msg" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-700 p-6 rounded-3xl text-center shadow-sm">
                <svg class="w-16 h-16 mx-auto mb-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <h3 class="text-xl font-bold mb-1">Record Synced!</h3>
                <p class="text-emerald-600 text-sm">Database successfully updated.</p>
                <button onclick="resetScanner()" class="mt-6 w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-2xl transition-colors shadow-lg shadow-emerald-200">
                    Scan Next Bus
                </button>
            </div>

        </div>
    </main>

    <script>
        let html5QrCode;

        window.onload = function() {
            html5QrCode = new Html5Qrcode("reader");
            initCamera();
        };

        function initCamera() {
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length > 0) {
                    let cameraId = devices[0].id; 
                    for (let i = 0; i < devices.length; i++) {
                        if (devices[i].label.toLowerCase().includes("back") || 
                            devices[i].label.toLowerCase().includes("environment")) {
                            cameraId = devices[i].id;
                            break;
                        }
                    }
                    html5QrCode.start(
                        cameraId, 
                        { fps: 10, qrbox: { width: 250, height: 250 } },
                        (decodedText) => {
                            html5QrCode.stop().then(() => {
                                document.getElementById('bus_number').value = decodedText;
                                document.getElementById('camera-container').classList.add('hidden');
                                document.getElementById('form-container').classList.remove('hidden');
                            });
                        },
                        (errorMessage) => { }
                    ).catch((err) => { showManual(); });
                } else { showManual(); }
            }).catch(err => { showManual(); });
        }

        function showManual() {
            if(html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('camera-container').classList.add('hidden');
                    document.getElementById('form-container').classList.remove('hidden');
                });
            } else {
                document.getElementById('camera-container').classList.add('hidden');
                document.getElementById('form-container').classList.remove('hidden');
            }
        }

        function resetScanner() {
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('success-msg').classList.add('hidden');
            document.getElementById('camera-container').classList.remove('hidden');
            document.getElementById('scanForm').reset();
            
            setDirection('IN');
            setLoad('Filled');
            setRoute('Regular'); // Reset route to default
            initCamera();
        }

        function setDirection(val) {
            document.getElementById('direction').value = val;
            document.getElementById('btn-in').className = val === 'IN' ? "py-2.5 bg-white text-indigo-600 font-bold rounded-xl shadow-sm text-sm transition-all" : "py-2.5 text-slate-500 font-bold rounded-xl text-sm transition-all hover:text-slate-700";
            document.getElementById('btn-out').className = val === 'OUT' ? "py-2.5 bg-white text-indigo-600 font-bold rounded-xl shadow-sm text-sm transition-all" : "py-2.5 text-slate-500 font-bold rounded-xl text-sm transition-all hover:text-slate-700";
        }

        function setLoad(val) {
            document.getElementById('load').value = val;
            document.getElementById('btn-filled').className = val === 'Filled' ? "py-2.5 bg-white text-emerald-600 font-bold rounded-xl shadow-sm text-sm transition-all" : "py-2.5 text-slate-500 font-bold rounded-xl text-sm transition-all hover:text-slate-700";
            document.getElementById('btn-empty').className = val === 'Empty' ? "py-2.5 bg-white text-emerald-600 font-bold rounded-xl shadow-sm text-sm transition-all" : "py-2.5 text-slate-500 font-bold rounded-xl text-sm transition-all hover:text-slate-700";
        }

        // NEW: Handle 4-way Route Toggle
        function setRoute(val) {
            document.getElementById('route').value = val;
            const routes = [
                { id: 'route-regular', value: 'Regular' },
                { id: 'route-labour', value: 'Labour' },
                { id: 'route-industrial', value: 'Industrial Visit' },
                { id: 'route-exam', value: 'Exam / Event' }
            ];
            
            routes.forEach(r => {
                const btn = document.getElementById(r.id);
                if (r.value === val) {
                    btn.className = "py-3 bg-white text-indigo-600 font-bold rounded-xl shadow-sm text-xs sm:text-sm transition-all";
                } else {
                    btn.className = "py-3 text-slate-500 font-bold rounded-xl text-xs sm:text-sm transition-all hover:text-slate-700";
                }
            });
        }

        document.getElementById('scanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Syncing...';
            btn.disabled = true;

            const payload = {
                bus_number: document.getElementById('bus_number').value,
                direction: document.getElementById('direction').value,
                load: document.getElementById('load').value,
                route: document.getElementById('route').value, // Send new route data
                km: document.getElementById('km').value
            };

            try {
                const res = await fetch('/submit-scan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (err) {
                alert('Connection error. Please try again.');
            } finally {
                btn.innerText = 'Confirm & Sync Record';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
