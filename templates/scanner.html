<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen pb-10">

    <header class="bg-white px-6 py-4 shadow-sm sticky top-0 z-50 flex justify-between items-center border-b border-gray-100">
        <div>
            <h1 class="text-xl font-bold text-indigo-900 tracking-tight">Scanner Terminal</h1>
            <p class="text-xs text-gray-500 font-medium">Live Gateway Sync</p>
        </div>
        <a href="/logout" class="bg-red-50 text-red-600 px-4 py-2 rounded-full text-sm font-bold shadow-sm border border-red-100 hover:bg-red-100 transition">Log Out</a>
    </header>

    <main class="max-w-md mx-auto p-4 mt-4">
        
        <div id="scan-view" class="bg-white p-4 rounded-3xl shadow-xl shadow-indigo-100/50 border border-gray-100 transition-all">
            <div id="reader" class="rounded-2xl overflow-hidden bg-black aspect-square w-full shadow-inner border-4 border-indigo-50"></div>
            <button onclick="showForm()" class="mt-6 w-full py-4 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-2xl font-semibold transition-all">
                Camera failed? Type Manually
            </button>
        </div>

        <div id="form-view" class="hidden bg-white p-6 rounded-3xl shadow-xl shadow-indigo-100/50 border border-gray-100 space-y-6">
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Bus Plate Number</label>
                <input type="text" id="bus_number" placeholder="e.g. GJ04 EA 2355" class="w-full bg-gray-50 border border-gray-200 text-xl font-bold text-center text-indigo-900 rounded-2xl px-4 py-4 uppercase focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all">
            </div>

            <div class="bg-gray-100 p-1 rounded-2xl flex relative">
                <button id="dir_in" onclick="setOpt('dir', 'IN')" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 bg-white shadow-md text-indigo-600">Arriving (IN)</button>
                <button id="dir_out" onclick="setOpt('dir', 'OUT')" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 text-gray-500">Departing (OUT)</button>
            </div>

            <div class="bg-gray-100 p-1 rounded-2xl flex relative">
                <button id="load_filled" onclick="setOpt('load', 'Filled')" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 bg-white shadow-md text-emerald-600">With Passengers</button>
                <button id="load_empty" onclick="setOpt('load', 'Empty')" class="flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 text-gray-500">Empty / Deadhead</button>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Odometer / KM (Optional)</label>
                <input type="number" id="km" placeholder="000000" class="w-full bg-gray-50 border border-gray-200 text-lg rounded-2xl px-4 py-3 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all">
            </div>

            <button onclick="submitData()" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-200 transition-all active:scale-95 text-lg">
                Confirm & Sync Record
            </button>
        </div>

        <div id="success-view" class="hidden bg-white p-8 rounded-3xl shadow-xl shadow-emerald-100/50 border border-gray-100 text-center space-y-6 mt-10">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900">Record Saved!</h2>
            <p class="text-gray-500 text-sm">The bus movement has been successfully logged to the database.</p>
            
            <button onclick="resetScanner()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 text-lg mt-4">
                Scan Next Bus
            </button>
        </div>

    </main>

    <script>
        let dir = 'IN', load = 'Filled', scanner;

        function startScanner() {
            scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: { width: 250, height: 250 } });
            scanner.render((text) => {
                document.getElementById('bus_number').value = text;
                showForm();
            });
        }

        function showForm() {
            if(scanner) scanner.clear();
            document.getElementById('scan-view').classList.add('hidden');
            document.getElementById('success-view').classList.add('hidden');
            document.getElementById('form-view').classList.remove('hidden');
        }

        function setOpt(type, val) {
            if (type === 'dir') {
                dir = val;
                document.getElementById('dir_in').className = val === 'IN' ? "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 bg-white shadow-md text-indigo-600" : "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 text-gray-500";
                document.getElementById('dir_out').className = val === 'OUT' ? "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 bg-white shadow-md text-indigo-600" : "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 text-gray-500";
            } else {
                load = val;
                document.getElementById('load_filled').className = val === 'Filled' ? "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 bg-white shadow-md text-emerald-600" : "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 text-gray-500";
                document.getElementById('load_empty').className = val === 'Empty' ? "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 bg-white shadow-md text-emerald-600" : "flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 text-gray-500";
            }
        }

        function submitData() {
            fetch('/submit-scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bus_number: document.getElementById('bus_number').value,
                    direction: dir, load: load, km: document.getElementById('km').value
                })
            }).then(r => r.json()).then(res => {
                if(res.success) {
                    // Hide the form, show the success screen
                    document.getElementById('form-view').classList.add('hidden');
                    document.getElementById('success-view').classList.remove('hidden');
                } else alert("Error: " + res.message);
            });
        }

        function resetScanner() {
            // Clear inputs
            document.getElementById('bus_number').value = '';
            document.getElementById('km').value = '';
            
            // Reset toggles to default
            setOpt('dir', 'IN');
            setOpt('load', 'Filled');

            // Hide success screen, show camera
            document.getElementById('success-view').classList.add('hidden');
            document.getElementById('scan-view').classList.remove('hidden');
            
            startScanner();
        }

        // Initialize camera on page load
        startScanner();
    </script>
</body>
</html>
